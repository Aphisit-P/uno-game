<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>UNO Online - เล่นเกม</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="theme-switcher">
    <button data-theme="light" title="สว่าง">☀️</button>
    <button data-theme="dark" title="มืด">🌙</button>
    <button data-theme="cool" title="เย็น">❄️</button>
  </div>

  <div class="game-table">
    <!-- ที่นั่งคู่ต่อสู้ จัดวงกลมด้วย JS -->
    <div class="table-surface" id="opponents"></div>

    <!-- กองกลาง -->
    <div class="center-area">
      <div class="pile-group">
        <button class="draw-pile" id="drawPile" title="จั่วการ์ด">
          <div class="deck-stack"></div>
          <div class="deck-stack"></div>
          <div class="deck-stack top"></div>
        </button>
        <div class="discard-pile" id="topCard"></div>
      </div>
      <div class="turn-indicator" id="turnIndicator"></div>
    </div>

    <!-- มือของตัวเอง -->
    <div class="your-area">
      <div class="your-info">
        <span id="yourName"></span>
        <button id="unoBtn" class="hidden">UNO!</button>
      </div>
      <div class="hand" id="hand"></div>
    </div>
  </div>

  <script src="https://uno-game-1i2s.onrender.com/socket.io/socket.io.js"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
