<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>UNO Online - เล่นเกม</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="theme-switcher">
    <button data-theme="light" title="สว่าง">☀️</button>
    <button data-theme="dark" title="มืด">🌙</button>
    <button data-theme="cool" title="เย็น">❄️</button>
  </div>

  <div class="game-table">
    <div class="table-grid">
      <div class="seat seat-top" id="seatTop"></div>
      <div class="seat seat-left" id="seatLeft"></div>

      <div class="center-area">
        <div class="pile-group">
          <button class="draw-pile" id="drawPile" title="จั่วการ์ด">
            <div class="deck-stack"></div>
            <div class="deck-stack"></div>
            <div class="deck-stack top"></div>
          </button>
          <div class="discard-pile" id="topCard"></div>
        </div>
        <div class="turn-indicator" id="turnIndicator"></div>
      </div>

      <div class="seat seat-right" id="seatRight"></div>

      <div class="seat seat-bottom">
        <div class="your-info">
          <span id="yourName"></span>
          <button id="unoBtn" class="hidden">UNO!</button>
        </div>
        <div class="hand" id="hand"></div>
      </div>
    </div>

    <!-- สำหรับกรณีผู้เล่นเกิน 4 คน -->
    <div class="overflow-seats" id="overflowSeats"></div>
  </div>

  <script src="https://uno-game-1i2s.onrender.com/socket.io/socket.io.js"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
