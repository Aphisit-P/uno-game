<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>UNO Online - เริ่มเล่น</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="theme-switcher">
    <button data-theme="light">☀️</button>
    <button data-theme="dark">🌙</button>
    <button data-theme="cool">❄️</button>
  </div>

  <div class="lobby-container">
    <h1>🎴 UNO Online</h1>
    <input id="nameInput" placeholder="ใส่ชื่อของคุณ" maxlength="15">

    <button id="createBtn" class="primary-btn">สร้างห้องใหม่</button>

    <div class="divider">หรือ</div>

    <input id="roomCodeInput" placeholder="ใส่รหัสห้อง" maxlength="6">
    <button id="joinBtn" class="secondary-btn">เข้าร่วมห้อง</button>
  </div>

  <script src="lobby.js"></script>
</body>
</html>
