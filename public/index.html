<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>UNO Online</title>
  <link rel="stylesheet" href="uno-game/public/style.css">
</head>
<body>
  <div class="theme-switcher">
    <button data-theme="light" title="สว่าง">☀️</button>
    <button data-theme="dark" title="มืด">🌙</button>
    <button data-theme="cool" title="เย็น">❄️</button>
  </div>

  <div class="game-table">
    <div id="players"></div>
    <div class="discard-pile" id="topCard"></div>
    <button id="drawPile" class="draw-pile"></button>
    <div class="hand" id="hand"></div>
    <button id="startBtn">เริ่มเกม</button>
    <button id="drawBtn">จั่วการ์ด</button>
    <button id="unoBtn">UNO!</button>
  </div>

<script src="https://uno-game-1i2s.onrender.com/socket.io/socket.io.js"></script>
<script src="config.js"></script>
  <script src="...public/script.js"></script>
